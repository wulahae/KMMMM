monitor.yml
name: Auto_Inventory_Check

on:
  schedule:
    - cron: '*/10 * * * *'  # 每 10 分鐘自動跑一次
  workflow_dispatch:       # 讓你可以手動點擊按鈕來測試

jobs:
  run_job:
    runs-on: ubuntu-latest
    steps:
      - name: 複製代碼到伺服器
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝必要套件
        run: pip install requests

      - name: 執行監控腳本
        run: python monitor.py

      - name: 檢查是否有變動並推送到倉庫
        run: |
          if [ -f changed.txt ]; then
            git config --global user.name "InventoryBot"
            git config --global user.email "bot@github.com"
            git add inventory_history.csv
            git commit -m "庫存更新: $(date)"
            git push
          else
            echo "庫存無變動，不需要 Push。"
          fi
